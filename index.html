<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adrian Pereda - Info</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #0f131a;
            --bg-soft: #171c24;
            --card-bg: rgba(20, 26, 34, 0.92);
            --panel-bg: rgba(24, 31, 41, 0.86);
            --text-main: #e7ecf2;
            --text-soft: #bdc6d2;
            --text-muted: #8b96a7;
            --border: rgba(139, 150, 167, 0.24);
            --accent: #7b8aa1;
            --accent-strong: #5f6d82;
            --santander-red: #c16363;
            --prex-purple: #8168a5;
            --transport-green: #7a9c84;
            --whatsapp-green: #25d366;
            --whatsapp-hover: #1ca14f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(900px circle at 10% -10%, #1a2230 0%, transparent 50%),
                radial-gradient(900px circle at 90% -15%, #202631 0%, transparent 48%),
                linear-gradient(170deg, var(--bg), #11161f);
            display: flex;
            justify-content: center;
            padding: 42px 18px 30px;
        }

        .container {
            width: 100%;
            max-width: 760px;
        }

        header {
            text-align: center;
            margin-bottom: 34px;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 3vw, 2.6rem);
            letter-spacing: -0.03em;
            font-weight: 800;
        }

        .subtitle {
            margin-top: 10px;
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.01em;
        }

        .language-selector-wrap {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }

        .language-selector {
            display: inline-flex;
            flex-wrap: wrap;
            justify-content: center;
            border-radius: 999px;
            border: 1px solid rgba(139, 150, 167, 0.28);
            background: rgba(18, 24, 32, 0.85);
            padding: 4px;
            gap: 4px;
            max-width: 100%;
        }

        .lang-btn {
            border: 0;
            border-radius: 999px;
            background: transparent;
            color: var(--text-soft);
            font-size: 0.84rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 8px 16px;
            cursor: pointer;
            transition: background-color 0.18s ease, color 0.18s ease;
        }

        .lang-btn[aria-pressed="true"] {
            background: rgba(123, 138, 161, 0.25);
            color: var(--text-main);
        }

        .single-card-area {
            display: flex;
            justify-content: center;
        }

        .language-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            box-shadow:
                0 10px 24px rgba(0, 0, 0, 0.28);
            width: 100%;
        }

        .language-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(139, 150, 167, 0.2);
        }

        .language-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            color: var(--text-soft);
        }

        .language-badge {
            font-size: 0.72rem;
            color: #d2dae4;
            background: rgba(123, 138, 161, 0.18);
            border: 1px solid rgba(123, 138, 161, 0.28);
            border-radius: 999px;
            padding: 4px 10px;
            letter-spacing: 0.03em;
            font-weight: 600;
        }

        .info-section {
            background: var(--panel-bg);
            border: 1px solid rgba(139, 150, 167, 0.14);
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 14px;
        }

        .info-section:last-child {
            margin-bottom: 0;
        }

        .section-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            gap: 12px;
        }

        .section-head > div:last-child {
            text-align: right;
        }

        .bank-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bank-icon {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: rgba(15, 23, 42, 0.7);
            border: 1px solid rgba(139, 150, 167, 0.18);
            font-size: 0.9rem;
        }

        .bank-name {
            display: block;
            font-weight: 700;
            font-size: 1rem;
        }

        .bank-sub {
            color: var(--text-muted);
            font-size: 0.76rem;
        }

        .badge {
            padding: 5px 11px;
            border-radius: 999px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .badge-santander {
            color: #f1dcdc;
            background: rgba(193, 99, 99, 0.16);
            border: 1px solid rgba(193, 99, 99, 0.3);
        }

        .badge-prex {
            color: #e8e1f0;
            background: rgba(129, 104, 165, 0.16);
            border: 1px solid rgba(129, 104, 165, 0.3);
        }

        .badge-transport {
            color: #14291b;
            background: var(--transport-green);
            border: 1px solid rgba(122, 156, 132, 0.58);
        }

        .contact-number-large {
            font-size: clamp(1.35rem, 2.1vw, 1.6rem);
            font-weight: 700;
            letter-spacing: 0.02em;
            font-family: 'Inter', monospace;
            margin-bottom: 10px;
        }

        .contact-locations {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 12px;
        }

        .contact-locations span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            color: #95b89f;
            background: rgba(122, 156, 132, 0.12);
            border: 1px solid rgba(122, 156, 132, 0.25);
            border-radius: 999px;
            padding: 5px 10px;
            font-size: 0.78rem;
        }

        .action-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-copy,
        .btn-whatsapp {
            border-radius: 10px;
            font-size: 0.84rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, background-color 0.2s ease;
        }

        .btn-copy {
            border: 1px solid rgba(139, 150, 167, 0.32);
            background: rgba(38, 46, 58, 0.82);
            color: var(--text-main);
            padding: 10px 14px;
            flex: 1 1 150px;
        }

        .btn-copy:hover {
            background: rgba(46, 56, 70, 0.96);
            transform: translateY(-0.5px);
            box-shadow: 0 4px 10px rgba(8, 12, 17, 0.28);
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: 1px solid rgba(37, 211, 102, 0.65);
            background: var(--whatsapp-green);
            color: #10321e;
            padding: 10px 14px;
            flex: 2 1 240px;
        }

        .btn-whatsapp:hover {
            background: var(--whatsapp-hover);
            transform: translateY(-0.5px);
            box-shadow: 0 4px 10px rgba(22, 88, 49, 0.3);
        }

        .branch-info {
            color: var(--text-muted);
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 8px;
        }

        .account-group {
            display: grid;
            gap: 8px;
        }

        .account-row {
            background: rgba(17, 23, 31, 0.76);
            border: 1px solid rgba(139, 150, 167, 0.14);
            border-radius: 10px;
            padding: 10px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: end;
            gap: 10px;
        }

        .account-label {
            display: block;
            color: var(--text-muted);
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            margin-bottom: 5px;
        }

        .account-number {
            font-size: 1rem;
            font-family: 'Inter', monospace;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .section-spacer {
            margin-top: 12px;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-muted);
            font-size: 0.78rem;
        }

        .toast {
            position: fixed;
            right: 16px;
            bottom: 18px;
            background: rgba(22, 29, 39, 0.95);
            border: 1px solid rgba(123, 138, 161, 0.35);
            color: #d8e0ea;
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 0.82rem;
            opacity: 0;
            transform: translateY(6px);
            pointer-events: none;
            transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 940px) {
            .container {
                max-width: 680px;
            }
        }

        @media (max-width: 520px) {
            body {
                padding: 28px 12px 20px;
            }

            .language-card {
                padding: 16px;
            }

            .section-head {
                align-items: flex-start;
            }

            .language-selector {
                border-radius: 14px;
                padding: 3px;
            }

            .lang-btn {
                padding: 8px 10px;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Adrian Pereda</h1>
            <div class="subtitle" id="subtitle"></div>
        </header>

        <div class="language-selector-wrap">
            <div class="language-selector" role="group" aria-label="Language selector">
                <button class="lang-btn" id="lang-es" aria-pressed="true" onclick="setLanguage('es')">Español</button>
                <button class="lang-btn" id="lang-en" aria-pressed="false" onclick="setLanguage('en')">English</button>
                <button class="lang-btn" id="lang-pt" aria-pressed="false" onclick="setLanguage('pt')">Português</button>
            </div>
        </div>

        <main class="single-card-area">
            <article class="language-card">
                <div class="language-head">
                    <div class="language-title"><i class="fa-solid fa-language"></i> <span id="lang-title"></span></div>
                    <span class="language-badge" id="lang-badge"></span>
                </div>

                <section class="info-section">
                    <div class="section-head">
                        <div class="bank-info">
                            <div class="bank-icon" style="color: #7a9c84;"><i class="fa-solid fa-car"></i></div>
                            <div>
                                <span class="bank-name" id="transport-name"></span>
                                <span class="bank-sub" id="transport-sub"></span>
                            </div>
                        </div>
                        <span class="badge badge-transport" id="transport-badge"></span>
                    </div>

                    <div class="contact-number-large">+598 99 774 019</div>
                    <div class="contact-locations">
                        <span><i class="fa-solid fa-location-dot"></i> <span id="location-1"></span></span>
                        <span><i class="fa-solid fa-location-dot"></i> <span id="location-2"></span></span>
                        <span><i class="fa-solid fa-champagne-glasses"></i> <span id="location-3"></span></span>
                        <span><i class="fa-solid fa-plane-departure"></i> <span id="location-4"></span></span>
                    </div>
                    <div class="action-row">
                        <a href="https://wa.me/59899774019" target="_blank" class="btn-whatsapp" id="whatsapp-btn">
                            <i class="fa-brands fa-whatsapp"></i> <span id="whatsapp-text"></span>
                        </a>
                        <button class="btn-copy" onclick="copiar('+59899774019')" id="copy-phone-btn"></button>
                    </div>
                </section>

                <section class="info-section">
                    <div class="section-head">
                        <div class="bank-info">
                            <div class="bank-icon" style="color: #c16363;"><i class="fa-solid fa-fire"></i></div>
                            <div>
                                <span class="bank-name">Santander</span>
                                <span class="bank-sub" id="santander-sub"></span>
                            </div>
                        </div>
                        <span class="badge badge-santander">Santander</span>
                    </div>
                    <div class="branch-info"><i class="fa-solid fa-building-columns"></i> <span id="branch-info"></span></div>
                    <div class="account-group">
                        <div class="account-row">
                            <div>
                                <span class="account-label" id="usd-label"></span>
                                <div class="account-number">005201484920</div>
                            </div>
                            <button class="btn-copy" onclick="copiar('005201484920')" id="copy-btn-1"></button>
                        </div>
                        <div class="account-row">
                            <div>
                                <span class="account-label" id="uyu-label"></span>
                                <div class="account-number">001201340671</div>
                            </div>
                            <button class="btn-copy" onclick="copiar('001201340671')" id="copy-btn-2"></button>
                        </div>
                    </div>
                </section>

                <section class="info-section">
                    <div class="section-head">
                        <div class="bank-info">
                            <div class="bank-icon" style="color: #8168a5;"><i class="fa-solid fa-wallet"></i></div>
                            <div>
                                <span class="bank-name">Prex</span>
                                <span class="bank-sub" id="prex-sub"></span>
                            </div>
                        </div>
                        <span class="badge badge-prex">Prex</span>
                    </div>
                    <div class="account-row">
                        <div>
                            <span class="account-label" id="prex-label"></span>
                            <div class="account-number">35815</div>
                        </div>
                        <button class="btn-copy" onclick="copiar('35815')" id="copy-btn-3"></button>
                    </div>
                </section>
            </article>
        </main>

        <footer>© Maarteeno 2025</footer>
    </div>

    <div id="toast" class="toast" aria-live="polite"></div>

    <script>
        var activeLang = 'es';
        var translations = {
            es: {
                subtitle: 'Información de contacto y cuentas',
                langTitle: 'Español',
                langBadge: 'ES',
                transport: {
                    name: 'Traslados',
                    sub: 'Contacto Directo',
                    badge: 'Info',
                    whatsapp: 'Enviar WhatsApp',
                    copyPhone: 'Copiar Número',
                    locations: ['Punta del Este', 'Colonia', 'Eventos', 'Aeropuerto/Traslados']
                },
                santander: {
                    sub: 'Cuentas USD y UYU',
                    branch: 'Sucursal 60 - Puerto del Buceo',
                    usdLabel: 'Caja de ahorro en dólares',
                    uyuLabel: 'Caja de ahorro en pesos'
                },
                prex: {
                    sub: 'Cuenta digital',
                    label: 'Número de cuenta Prex'
                },
                copyBtn: 'Copiar',
                copySuccess: 'Copiado',
                copyError: 'No se pudo copiar'
            },
            en: {
                subtitle: 'Contact & account information',
                langTitle: 'English',
                langBadge: 'EN',
                transport: {
                    name: 'Transport',
                    sub: 'Direct Contact',
                    badge: 'Info',
                    whatsapp: 'Send Message',
                    copyPhone: 'Copy Number',
                    locations: ['Punta del Este', 'Colonia', 'Events', 'Airport/Transfers']
                },
                santander: {
                    sub: 'USD & UYU Accounts',
                    branch: 'Branch 60 - Puerto del Buceo',
                    usdLabel: 'USD savings account',
                    uyuLabel: 'UYU savings account'
                },
                prex: {
                    sub: 'Digital account',
                    label: 'Prex account number'
                },
                copyBtn: 'Copy',
                copySuccess: 'Copied',
                copyError: 'Could not copy'
            },
            pt: {
                subtitle: 'Informações de contato e dados bancários',
                langTitle: 'Português',
                langBadge: 'PT',
                transport: {
                    name: 'Transporte',
                    sub: 'Contato direto',
                    badge: 'Informações',
                    whatsapp: 'Enviar WhatsApp',
                    copyPhone: 'Copiar número',
                    locations: ['Punta del Este', 'Colonia', 'Eventos', 'Aeroporto/Transfer']
                },
                santander: {
                    sub: 'Contas em USD e UYU',
                    branch: 'Agência 60 - Puerto del Buceo',
                    usdLabel: 'Conta poupança em dólares',
                    uyuLabel: 'Conta poupança em pesos uruguaios'
                },
                prex: {
                    sub: 'Conta digital',
                    label: 'Número da conta Prex'
                },
                copyBtn: 'Copiar',
                copySuccess: 'Copiado',
                copyError: 'Não foi possível copiar'
            }
        };

        function setLanguage(lang) {
            activeLang = lang;
            renderCard(lang);
        }

        function renderCard(lang) {
            var t = translations[lang];

            document.getElementById('subtitle').textContent = t.subtitle;
            document.getElementById('lang-title').textContent = t.langTitle;
            document.getElementById('lang-badge').textContent = t.langBadge;

            document.getElementById('transport-name').textContent = t.transport.name;
            document.getElementById('transport-sub').textContent = t.transport.sub;
            document.getElementById('transport-badge').textContent = t.transport.badge;
            document.getElementById('location-1').textContent = t.transport.locations[0];
            document.getElementById('location-2').textContent = t.transport.locations[1];
            document.getElementById('location-3').textContent = t.transport.locations[2];
            document.getElementById('location-4').textContent = t.transport.locations[3];
            document.getElementById('whatsapp-text').textContent = t.transport.whatsapp;
            document.getElementById('copy-phone-btn').textContent = t.transport.copyPhone;

            document.getElementById('santander-sub').textContent = t.santander.sub;
            document.getElementById('branch-info').textContent = t.santander.branch;
            document.getElementById('usd-label').textContent = t.santander.usdLabel;
            document.getElementById('uyu-label').textContent = t.santander.uyuLabel;

            document.getElementById('prex-sub').textContent = t.prex.sub;
            document.getElementById('prex-label').textContent = t.prex.label;

            document.getElementById('copy-btn-1').textContent = t.copyBtn;
            document.getElementById('copy-btn-2').textContent = t.copyBtn;
            document.getElementById('copy-btn-3').textContent = t.copyBtn;

            document.getElementById('lang-es').setAttribute('aria-pressed', String(lang === 'es'));
            document.getElementById('lang-en').setAttribute('aria-pressed', String(lang === 'en'));
            document.getElementById('lang-pt').setAttribute('aria-pressed', String(lang === 'pt'));
        }

        function copiar(texto) {
            navigator.clipboard.writeText(texto).then(function() {
                showToast(translations[activeLang].copySuccess + ': ' + texto);
            }, function(err) {
                console.error('Error: ', err);
                showToast(translations[activeLang].copyError);
            });
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(function() {
                toast.classList.remove('show');
            }, 1700);
        }

        renderCard(activeLang);
    </script>
</body>
</html>
