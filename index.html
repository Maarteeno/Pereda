<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Pereda Traslados">
  <meta name="description" content="Adrián Pereda - Traslados en Bestune NAT eléctrico">
  <title>Adrián Pereda - Traslados</title>
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="app">
    <div class="sticky-top" id="sticky-top">
      <header class="app-header">
        <div class="header-center-cluster">
          <div class="brand">
            <span class="brand-name" id="brand-name">Adrián Pereda</span>
            <span class="brand-sub" id="header-subtitle">Conductor Profesional</span>
          </div>
          <div class="language-selector header-lang" role="group" aria-label="Idioma">
            <button type="button" class="lang-btn" data-lang="es" aria-label="Español" aria-pressed="true"><svg class="lang-flag" viewBox="0 0 32 24" aria-hidden="true"><rect width="32" height="24" fill="#c60b1e"/><rect y="6" width="32" height="12" fill="#ffc400"/></svg></button>
            <button type="button" class="lang-btn" data-lang="en" aria-label="English" aria-pressed="false"><svg class="lang-flag" viewBox="0 0 32 24" aria-hidden="true"><rect width="32" height="24" fill="#012169"/><path d="M0 0l32 24M32 0L0 24" stroke="#fff" stroke-width="4"/><path d="M0 0l32 24M32 0L0 24" stroke="#c8102e" stroke-width="2"/><path d="M16 0v24M0 12h32" stroke="#fff" stroke-width="6"/><path d="M16 0v24M0 12h32" stroke="#c8102e" stroke-width="3"/></svg></button>
            <button type="button" class="lang-btn" data-lang="pt" aria-label="Português" aria-pressed="false"><svg class="lang-flag" viewBox="0 0 32 24" aria-hidden="true"><rect width="32" height="24" fill="#009b3a"/><polygon points="16,2 30,12 16,22 2,12" fill="#fedf00"/><circle cx="16" cy="12" r="5" fill="#002776"/></svg></button>
          </div>
        </div>
      </header>
    </div>

    <main class="app-views" id="app-views">
      <section id="view-home" class="app-view app-view-active" aria-label="Inicio">
        <div class="home-vehicle-wrap">
          <div class="vehicle-hero-scene" id="vehicle-hero-scene">
            <div class="vehicle-ambient-glow" aria-hidden="true"></div>
            <div class="vehicle-ground-arc" aria-hidden="true"></div>
            <section class="vehicle-showcase vehicle-showcase-hero" id="vehicle-showcase">
              <span class="vehicle-badge" id="vehicle-badge">100% Eléctrico</span>
              <div class="vehicle-stage">
                <div class="vehicle-rotator vehicle-rotator-animated" id="vehicle-rotator">
                  <img src="assets/bestune-front.png" class="vehicle-view vehicle-view-photo active" data-angle="0" alt="Bestune NAT blanco vista 3/4 con puerta abierta">
                  <img src="assets/bestune-side.png" class="vehicle-view vehicle-view-photo" data-angle="1" alt="Bestune NAT blanco vista lateral">
                  <img src="assets/bestune-rear.png" class="vehicle-view vehicle-view-photo" data-angle="2" alt="Bestune NAT blanco vista frontal">
                </div>
              </div>
            </section>
          </div>
        </div>
        <nav class="hub-nav-grid" id="hub-nav" aria-label="Menú principal">
          <button type="button" class="hub-nav-btn" data-view="traslados">
            <img src="assets/bestune-side.png" alt="" class="hub-nav-vehicle-icon" aria-hidden="true">
            <span class="hub-nav-label" id="hub-traslados-label">Traslados</span>
          </button>
          <button type="button" class="hub-nav-btn" data-view="paseos">
            <span class="hub-nav-icon" aria-hidden="true">🗺️</span>
            <span class="hub-nav-label" id="hub-paseos-label">Paseos</span>
          </button>
          <button type="button" class="hub-nav-btn" data-view="contacto">
            <span class="hub-nav-icon" aria-hidden="true">📱</span>
            <span class="hub-nav-label" id="hub-contacto-label">Contacto</span>
          </button>
        </nav>
      </section>

      <section id="view-traslados" class="app-view" hidden aria-label="Traslados">
        <div class="subview-header">
          <button type="button" class="back-btn" data-view="home" id="back-traslados">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-traslados-label">Volver</span>
          </button>
          <h1 class="subview-title" id="traslados-title">Traslados</h1>
        </div>
        <div class="subview-body">
          <div class="dest-cards-grid" id="traslados-cards"></div>
        </div>
      </section>

      <section id="view-paseos" class="app-view" hidden aria-label="Paseos">
        <div class="subview-header">
          <button type="button" class="back-btn" data-view="home" id="back-paseos">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-paseos-label">Volver</span>
          </button>
          <h1 class="subview-title" id="paseos-title">Paseos</h1>
        </div>
        <div class="subview-body">
          <img src="assets/paseos/paseos-hero-ai.png" alt="" class="subview-hero-image" id="paseos-hero-image" loading="lazy">
          <p class="subview-intro" id="paseos-intro"></p>
          <div class="dest-cards-grid" id="paseos-cards"></div>
        </div>
      </section>

      <section id="view-contacto" class="app-view" hidden aria-label="Contacto">
        <div class="subview-header">
          <button type="button" class="back-btn" data-view="home" id="back-contacto">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
            <span id="back-contacto-label">Volver</span>
          </button>
          <h1 class="subview-title" id="contacto-title">Contacto</h1>
        </div>
        <div class="subview-body contact-panel">
          <img src="assets/contacto/contacto-hero-ai.png" alt="" class="subview-hero-image" id="contacto-hero-image" loading="lazy">
          <div class="profile-identity contact-identity">
            <img src="assets/adrian-pereda.png" alt="Adrián" class="driver-avatar profile-avatar" width="96" height="96" loading="lazy">
            <div class="profile-identity-meta">
              <h2 class="driver-name" id="driver-name">Adrián</h2>
              <p class="driver-role" id="driver-role">Conductor Profesional. Montevideo y La Costa</p>
            </div>
          </div>
          <ul class="contact-info-list" id="contact-info-list">
            <li class="contact-info-item" id="contact-coverage"></li>
            <li class="contact-info-item contact-info-vehicle" id="contact-vehicle"></li>
          </ul>
          <div class="qr-card contact-qr">
            <p class="vehicle-qr-label" id="qr-label">Escribile por WhatsApp</p>
            <a href="https://wa.me/59899774019" class="vehicle-qr-link" target="_blank" rel="noopener noreferrer" aria-label="WhatsApp Adrián Pereda">
              <img src="assets/whatsapp-qr.png" alt="QR WhatsApp Adrián Pereda" class="vehicle-qr-image" width="140" height="140" loading="lazy">
            </a>
            <p class="vehicle-qr-phone" id="vehicle-qr-phone">+598 99 774 019</p>
            <a href="https://wa.me/59899774019" class="qr-action-btn" id="qr-action-btn" target="_blank" rel="noopener noreferrer">Abrir WhatsApp</a>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <div class="update-gate" id="update-gate" hidden>
    <div class="update-gate-card" role="dialog" aria-modal="true" aria-labelledby="update-gate-title">
      <h2 class="update-gate-title" id="update-gate-title">Nueva versión disponible</h2>
      <p class="update-gate-text" id="update-gate-text">Hay una actualización de la app. Actualizá para ver el diseño más reciente.</p>
      <button type="button" class="update-gate-btn" id="update-gate-btn">Actualizar ahora</button>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
